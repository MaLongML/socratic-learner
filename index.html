const {useState,useRef,useEffect,useCallback} = React;

  openai:{name:"OpenAI",icon:"◉",color:"#7aa87a",ph:"sk-...",docs:"https://platform.openai.com/api-keys",
    models:[{id:"gpt-4o",lb:"GPT-4o"},{id:"gpt-4o-mini",lb:"GPT-4o Mini"},{id:"o1-preview",lb:"o1 Preview"}]},
  gemini:{name:"Google Gemini",icon:"◇",color:"#7a9fc4",ph:"AIza...",docs:"https://aistudio.google.com/app/apikey",
    models:[{id:"gemini-2.0-flash",lb:"Gemini 2.0 Flash"},{id:"gemini-1.5-pro",lb:"Gemini 1.5 Pro"}]},

// ── Storage ───────────────────────────────────────────────────────────────────
const K_CFG="insight_cfg";
const K_SES="insight_sessions";
const ls = {
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};
const getCfg=()=>ls.get(K_CFG)||{provider:"anthropic",model:"claude-sonnet-4-6",keys:{}};
const getSessions=()=>ls.get(K_SES)||[];
const saveSession=(s)=>{
  const list=getSessions();
  const i=list.findIndex(x=>x.id===s.id);
  const rec={...s,updatedAt:Date.now()};
  if(i>=0)list[i]=rec;else list.unshift(rec);
  ls.set(K_SES,list.slice(0,30));
};
const deleteSession=(id)=>ls.set(K_SES,getSessions().filter(s=>s.id!==id));
const mkId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// ── API caller ────────────────────────────────────────────────────────────────
async function callAI(prov,key,model,system,messages,json=false){
  const mm=messages.map(m=>({role:m.role,content:m.content}));
  if(prov==="anthropic"){
    const body={model,max_tokens:json?2000:1400,system,messages:mm};
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content[0].text;
  }
  if(prov==="openai"){
    const r=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model,max_tokens:json?2000:1400,messages:[{role:"system",content:system},...mm],...(json?{response_format:{type:"json_object"}}:{})})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.choices[0].message.content;
  }
  if(prov==="gemini"){
    const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system_instruction:{parts:[{text:system}]},contents:mm.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),generationConfig:{maxOutputTokens:json?2000:1400}})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  }
  if(prov==="deepseek"){
    const r=await fetch("https://api.deepseek.com/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model,max_tokens:json?2000:1400,messages:[{role:"system",content:system},...mm]})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.choices[0].message.content;
  }
  throw new Error("Unknown provider: "+prov);
}

// ── Prompts ───────────────────────────────────────────────────────────────────
const EXTRACT_PROMPT = (material,background)=>`你是一位深度阅读专家和教学设计师。

【学习者背景】
${background||"未提供，假设是具备基本逻辑思维的成年人"}

【学习材料】
${material}

请完成以下任务，严格以JSON格式返回，不要有任何其他文字：

1. 通读全部材料
2. 提炼3-6个"核心洞见"——不是知识点罗列，而是真正能改变认知、值得深思的发现
3. 按照"认知门槛从低到高"排序
4. 设计第一个探测学习者已知边界的问题

返回格式：
{
  "insights": [
    {
      "id": 1,
      "title": "用一句话表达这个洞见（要有冲击力，不是平淡描述）",
      "core": "这个洞见的本质是什么",
      "prerequisite": "理解它需要的先验认知",
      "misconception": "学习者最容易有的错误认知",
      "anchor": "可以用来切入苏格拉底对话的类比或现象"
    }
  ],
  "opening_probe": "第一个问题（不直接问材料内容，而是探测学习者的已有认知边界）"
}`;

const TEACH_PROMPT = (insights,currentIdx,userBackground,unlockedIds)=>{
  const locked=insights.filter(x=>!unlockedIds.includes(x.id));
  const current=insights[currentIdx]||insights[0];
  const unlocked=insights.filter(x=>unlockedIds.includes(x.id));
  return `你是一位苏格拉底式导师。你已经深度阅读了学习材料，提炼出以下核心洞见：

${insights.map((ins,i)=>`${i+1}. ${ins.title}`).join('\n')}

【学习者背景】
${userBackground||"未提供"}

【已解锁的洞见】
${unlocked.length>0?unlocked.map(x=>`✓ ${x.title}`).join('\n'):"（暂无）"}

【当前目标：引导学习者自己发现洞见${current.id}】
标题：${current.title}
本质：${current.core}
切入点：${current.anchor}
常见误解：${current.misconception}
需要的先验：${current.prerequisite}

【你的教学原则】
1. 用户永远不读原文——你是读书人，他是思考者
2. 每次只问一个问题，等待回答
3. 从用户说过的话出发，不从材料出发
4. 当用户的表达逼近洞见时，帮他精确化，然后说：
   "✦ [洞见标题]" （这是解锁信号，格式必须精确）
   之后用一两句话揭示这个洞见的完整表达，然后自然过渡到下一个洞见
5. 用户答错或理解偏了：直接说"这个方向不对"，用反问重新引导，不赞美
6. 用户答对方向：不赞美，直接深入追问
7. 绝对禁止：非常好、你真厉害、很棒、有洞察力等空洞套话
8. 全部洞见解锁后：做一个简短的整体连接，说明这些洞见之间的关系

记住：你的目标是让用户产生"我自己想到的"的感觉，而不是"老师教了我"。`;
};

// ── File parsers ──────────────────────────────────────────────────────────────
async function loadPdfJs(){
  if(window.pdfjsLib)return window.pdfjsLib;
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res(window.pdfjsLib);};
    s.onerror=rej;document.head.appendChild(s);
  });
}
async function parsePdf(f){
  const lib=await loadPdfJs();const pdf=await lib.getDocument({data:await f.arrayBuffer()}).promise;
  let t="";for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(" ")+"\n";}
  return t.trim();
}
async function parseDocx(f){const r=await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()});return r.value.trim();}
async function parseTxt(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(f,"UTF-8");});}

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtDate=(ts)=>{
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return"刚刚";if(d<3600)return Math.floor(d/60)+"分钟前";
  if(d<86400)return Math.floor(d/3600)+"小时前";if(d<604800)return Math.floor(d/86400)+"天前";
  return new Date(ts).toLocaleDateString("zh-CN",{month:"short",day:"numeric"});
};
const ficon=(n)=>({pdf:"📄",docx:"📝",doc:"📝",txt:"📃",md:"📋"}[n.split(".").pop().toLowerCase()]||"📁");

// Detect newly unlocked insight from AI reply
function detectUnlock(text,insights,unlockedIds){
  const newUnlocked=[];
  for(const ins of insights){
    if(unlockedIds.includes(ins.id))continue;
    if(text.includes("✦ "+ins.title)||text.includes("✦"+ins.title)){
      newUnlocked.push(ins.id);
    }
  }
  return newUnlocked;
}

// Find current active insight index
function getCurrentIdx(insights,unlockedIds){
  const idx=insights.findIndex(x=>!unlockedIds.includes(x.id));
  return idx===-1?insights.length-1:idx;
}

// Format message text — highlight ✦ unlock moments
function FmtMsg({text}){
  // Split on lines that start with ✦
  const lines=text.split('\n');
  return React.createElement('div',{style:{lineHeight:1.8}},
    lines.map((line,i)=>{
      if(line.trim().startsWith('✦')){
        return React.createElement('div',{key:i,style:{
          margin:'12px 0',padding:'10px 16px',
          background:'linear-gradient(135deg,#2a2010,#1e1a0e)',
          border:'1px solid #6b5a2a',borderRadius:8,
          color:'#e8c87a',fontSize:15,fontWeight:600,
          fontFamily:"'Lora',serif",letterSpacing:'0.02em'
        }},line);
      }
      return React.createElement('span',{key:i,style:{whiteSpace:'pre-wrap',display:'block',minHeight:line?'auto':'0.5em'}},line);
    })
  );
}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>

                style={{padding:'10px 14px',borderRadius:12,border:'1.5px solid '+(lc.provider===id?pp.color+'55':'#2e2820'),background:lc.provider===id?pp.color+'12':'#0e0c0a',color:lc.provider===id?pp.color:'#5a5040',fontSize:13,textAlign:'left',display:'flex',alignItems:'center',gap:8,transition:'all .2s'}}>
                <span style={{fontSize:15}}>{pp.icon}</span>
                <div><div style={{fontWeight:600,fontSize:12}}>{pp.name}</div><div style={{fontSize:10,opacity:.6,marginTop:2}}>{pp.models.length} 个模型</div></div>
                {lc.provider===id&&<span style={{marginLeft:'auto',fontSize:9,color:pp.color}}>●</span>}

          </div>
        </div>

          <div style={S.label}>模型</div>
          <select value={lc.model} onChange={e=>setLc(x=>({...x,model:e.target.value}))}
            style={{width:'100%',background:'#0e0c0a',border:'1px solid #2e2820',borderRadius:10,padding:'10px 14px',color:'#ddd5c5',fontSize:13,fontFamily:'inherit'}}>
            {p.models.map(m=><option key={m.id} value={m.id}>{m.lb}</option>)}
          </select>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{...S.label,display:'flex',justifyContent:'space-between'}}>
            <span>API Key</span>

          </div>

            onChange={e=>setLc(x=>({...x,keys:{...x.keys,[x.provider]:e.target.value}}))}

// ── Insight Node (sidebar) ────────────────────────────────────────────────────
function InsightNode({ins,status,index}){
  // status: 'locked' | 'active' | 'done'
  const colors={done:'#8a7a3a',active:'#c4956a',locked:'#2a2520'};
  const textColors={done:'#c4a84a',active:'#e8d8b8',locked:'#3a3028'};
  const c=colors[status];const tc=textColors[status];
  return(
    <div className={status==='done'?'unlock-anim':''} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'10px 14px',borderRadius:10,transition:'all .3s',background:status==='active'?'#1a1610':'transparent',border:status==='active'?'1px solid #3a2e18':'1px solid transparent'}}>
      <div style={{width:26,height:26,borderRadius:'50%',background:status==='done'?'linear-gradient(135deg,#4a3c10,#8a6a20)':status==='active'?'#1e1a0e':'#131110',border:'1.5px solid '+c,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,transition:'all .4s',boxShadow:status==='active'?'0 0 12px #c4956a30':'none'}}>
        {status==='done'
          ?<span style={{fontSize:11,color:'#c4a84a'}}>✓</span>
          :status==='active'
          ?<span style={{fontSize:10,color:'#c4956a',animation:'breathe 2s ease-in-out infinite'}}>●</span>
          :<span style={{fontSize:10,color:'#2a2520'}}>{index+1}</span>
        }
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,color:tc,lineHeight:1.5,fontWeight:status==='active'?600:400,transition:'color .3s'}}>{ins.title}</div>
        {status==='active'&&<div style={{fontSize:10,color:'#6a5a30',marginTop:3}}>正在探索中…</div>}
      </div>
    </div>
  );
}

// ── Session Card ──────────────────────────────────────────────────────────────
function SCard({s,onResume,onDel}){
  const [conf,setConf]=useState(false);
  const pv=PROV[s.provider]||PROV.anthropic;
  const done=s.unlocked.length;const total=s.insights.length;
  const pct=total>0?Math.round(done/total*100):0;
  return(
    <div style={{background:'#141210',border:'1px solid #222018',borderRadius:14,overflow:'hidden',transition:'border-color .2s'}}
      onMouseEnter={e=>e.currentTarget.style.borderColor='#3a3428'}
      onMouseLeave={e=>e.currentTarget.style.borderColor='#222018'}>
      <div style={{padding:'14px 16px 10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:'#d0c8b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Lora',serif"}}>{s.subject||"未命名会话"}</div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginTop:5}}>
              <span style={{fontSize:10,color:pv.color}}>{pv.icon} {pv.name}</span>
              <span style={{fontSize:10,color:'#3a3428'}}>·</span>
              <span style={{fontSize:10,color:'#5a5040'}}>{fmtDate(s.updatedAt)}</span>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
            <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:pct===100?'#8a7040':'#5a5040'}}>{done}/{total} 洞见</span>
            {!conf
              ?<button onClick={()=>setConf(true)} style={{background:'none',border:'none',color:'#2e2820',fontSize:11}}>删除</button>
              :<div style={{display:'flex',gap:6}}>
                 <span style={{fontSize:10,color:'#7a3030'}}>确认?</span>
                 <button onClick={()=>onDel(s.id)} style={{background:'none',border:'none',color:'#c06060',fontSize:11}}>是</button>
                 <button onClick={()=>setConf(false)} style={{background:'none',border:'none',color:'#5a5040',fontSize:11}}>否</button>
               </div>
            }
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:2,background:'#1e1c18',borderRadius:1,overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#6a5020,#c4956a)',borderRadius:1,transition:'width .5s ease'}}/>
        </div>
        {/* Insight previews */}
        <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:5}}>
          {s.insights.slice(0,4).map(ins=>(
            <span key={ins.id} style={{fontSize:10,padding:'2px 8px',borderRadius:8,background:s.unlocked.includes(ins.id)?'#2a2010':'#141210',color:s.unlocked.includes(ins.id)?'#c4a84a':'#3a3028',border:'1px solid '+(s.unlocked.includes(ins.id)?'#4a3a10':'#1e1c18')}}>
              {s.unlocked.includes(ins.id)?'✓ ':''}{ins.title.slice(0,18)}{ins.title.length>18?'…':''}
            </span>
          ))}
          {s.insights.length>4&&<span style={{fontSize:10,color:'#3a3428'}}>+{s.insights.length-4}</span>}
        </div>
      </div>
      <div style={{borderTop:'1px solid #1e1c18',padding:'10px 16px'}}>
        <button onClick={()=>onResume(s)}
          style={{width:'100%',padding:'8px',background:'#1a1810',border:'1px solid #2e2820',borderRadius:8,color:'#c4956a',fontSize:13,transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#c4956a18';e.currentTarget.style.borderColor='#c4956a44';}}
          onMouseLeave={e=>{e.currentTarget.style.background='#1a1810';e.currentTarget.style.borderColor='#2e2820';}}>
          {pct===100?'回顾会话':'继续学习 →'}
        </button>
      </div>
    </div>
  );
}

// Shared label style
const S={
  label:{fontSize:11,color:'#5a5040',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:10},
};

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [cfg,setCfg]   = useState(getCfg);
  const [showCfg,setShowCfg] = useState(false);
  const [screen,setScreen]   = useState("home");

  // Form
  const [tab,setTab]     = useState("text");
  const [txt,setTxt]     = useState("");
  const [url,setUrl]     = useState("");
  const [file,setFile]   = useState(null);
  const [drag,setDrag]   = useState(false);
  const [subj,setSubj]   = useState("");
  const [bg,setBg]       = useState("");

  // Session
  const [sid,setSid]         = useState(null);
  const [content,setContent] = useState("");
  const [insights,setInsights] = useState([]);
  const [unlocked,setUnlocked] = useState([]);
  const [msgs,setMsgs]       = useState([]);
  const [input,setInput]     = useState("");

  // UI
  const [loading,setLoading] = useState(false);
  const [step,setStep]       = useState(""); // busy message
  const [err,setErr]         = useState("");
  const [sessions,setSessions] = useState(getSessions);
  const [newInsights,setNewInsights] = useState([]); // briefly flash unlocked

  const endRef  = useRef(null);
  const fileRef = useRef(null);
  const taRef   = useRef(null);

  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  const apiKey=(cfg.keys&&cfg.keys[cfg.provider])||"";
  const prov=PROV[cfg.provider]||PROV.anthropic;

  // Persist current session state
  const persist=useCallback((newMsgs,newUnlocked,newInsights2)=>{
    if(!sid)return;
    const session={
      id:sid,subject:subj,background:bg,content,
      insights:newInsights2||insights,
      unlocked:newUnlocked||unlocked,
      messages:newMsgs||msgs,
      provider:cfg.provider,model:cfg.model,
      createdAt:getSessions().find(x=>x.id===sid)?.createdAt||Date.now(),
      updatedAt:Date.now(),
    };
    saveSession(session);
    setSessions(getSessions());
  },[sid,subj,bg,content,insights,unlocked,msgs,cfg]);

  // Get content from input
  async function getContent(){
    if(tab==="text")return txt;
    if(tab==="url"){
      setStep("读取链接…");
      const r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
      const d=await r.json();
      const tmp=document.createElement("div");tmp.innerHTML=d.contents;
      ["script","style","nav","header","footer","aside"].forEach(t=>tmp.querySelectorAll(t).forEach(e=>e.remove()));
      return tmp.innerText.replace(/\n{3,}/g,"\n\n").trim();
    }
    if(tab==="file"&&file){
      setStep("解析文件…");
      const ext=file.name.split(".").pop().toLowerCase();
      if(ext==="pdf")return parsePdf(file);
      if(ext==="docx"||ext==="doc")return parseDocx(file);
      return parseTxt(file);
    }
    throw new Error("内容为空");
  }

  // Start a new session
  async function startSession(){
    setErr("");
    if(!apiKey){setShowCfg(true);return;}
    setLoading(true);setStep("读取内容…");
    try{
      const c=await getContent();
      if(!c.trim())throw new Error("内容为空");
      setContent(c);
      setStep("AI 正在深度阅读材料，提炼核心洞见…");
      // Layer 1: extract insights
      const raw=await callAI(cfg.provider,apiKey,cfg.model,
        EXTRACT_PROMPT(c,bg),
        [{role:"user",content:"请分析并返回JSON"}],true
      );
      let parsed;
      try{
        const cleaned=raw.replace(/```json/g,"").replace(/```/g,"").trim();
        parsed=JSON.parse(cleaned);
      }catch{throw new Error("洞见提炼失败，请重试");}
      const insArr=parsed.insights||[];
      if(insArr.length===0)throw new Error("未能提炼出有效洞见");
      setInsights(insArr);
      setStep("启动对话…");
      // Layer 2: start conversation with opening probe
      const openingQ=parsed.opening_probe||"在接触这个主题之前，你对它已有什么样的认识或直觉？";
      const sysP=TEACH_PROMPT(insArr,0,bg,[]);
      const initMsgs=[{role:"assistant",content:openingQ}];
      setMsgs(initMsgs);setUnlocked([]);
      const newId=mkId();setSid(newId);
      const session={id:newId,subject:subj||"未命名",background:bg,content:c,insights:insArr,unlocked:[],messages:initMsgs,provider:cfg.provider,model:cfg.model,createdAt:Date.now(),updatedAt:Date.now()};
      saveSession(session);setSessions(getSessions());
      setScreen("chat");
    }catch(e){setErr(e.message);}
    setLoading(false);setStep("");
  }

  // Send a message
  async function send(){
    if(!input.trim()||loading)return;
    const userMsg={role:"user",content:input};
    const nextMsgs=[...msgs,userMsg];
    setMsgs(nextMsgs);setInput("");setLoading(true);setErr("");
    const curIdx=getCurrentIdx(insights,unlocked);
    const sysP=TEACH_PROMPT(insights,curIdx,bg,unlocked);
    try{
      const reply=await callAI(cfg.provider,apiKey,cfg.model,sysP,nextMsgs);
      // Detect unlocked insights
      const newUnlocks=detectUnlock(reply,insights,unlocked);
      const nextUnlocked=[...unlocked,...newUnlocks];
      if(newUnlocks.length>0){
        setNewInsights(newUnlocks);
        setTimeout(()=>setNewInsights([]),2000);
      }
      setUnlocked(nextUnlocked);
      const finalMsgs=[...nextMsgs,{role:"assistant",content:reply}];
      setMsgs(finalMsgs);
      persist(finalMsgs,nextUnlocked,insights);
    }catch(e){
      setErr(e.message);
      setMsgs(p=>[...p,{role:"assistant",content:"⚠ "+e.message}]);
    }
    setLoading(false);
  }

  function resume(s){
    setSid(s.id);setSubj(s.subject||"");setBg(s.background||"");
    setContent(s.content);setInsights(s.insights||[]);setUnlocked(s.unlocked||[]);
    setMsgs(s.messages||[]);setErr("");setScreen("chat");
  }

  function goHome(){
    setScreen("home");setSid(null);setMsgs([]);setInsights([]);setUnlocked([]);
    setErr("");setTxt("");setUrl("");setFile(null);setSubj("");setBg("");
  }

  function delSession(id){deleteSession(id);setSessions(getSessions());}

  const canStart=(tab==="text"&&txt.trim())||(tab==="url"&&url.trim())||(tab==="file"&&file);
  const curIdx=getCurrentIdx(insights,unlocked);
  const allDone=insights.length>0&&unlocked.length===insights.length;

  // ── Settings overlay
  if(showCfg)return <Settings cfg={cfg} setCfg={setCfg} onClose={()=>setShowCfg(false)}/>;

  // ── Chat screen ─────────────────────────────────────────────────────────────
  if(screen==="chat"){
    return(
      <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#0e0c0a'}}>

        {/* Sidebar */}
        <div style={{width:240,background:'#0b0a08',borderRight:'1px solid #1e1c18',display:'flex',flexDirection:'column',flexShrink:0}}>
          {/* Header */}
          <div style={{padding:'18px 16px 14px',borderBottom:'1px solid #1e1c18'}}>
            <div style={{fontSize:11,color:'#4a4030',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>学习会话</div>
            <div style={{fontSize:14,color:'#d0c8b8',fontWeight:600,fontFamily:"'Lora',serif",lineHeight:1.4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{subj||"未命名"}</div>
          </div>

          {/* Model + settings */}
          <div style={{padding:'10px 16px',borderBottom:'1px solid #1e1c18'}}>
            <button onClick={()=>setShowCfg(true)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'7px 10px',background:'#0e0c0a',border:'1px solid #1e1c18',borderRadius:8,color:'#5a5040',fontSize:11,textAlign:'left'}}>
              <span style={{color:prov.color,fontSize:12}}>{prov.icon}</span>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{prov.models.find(m=>m.id===cfg.model)?.lb||cfg.model}</span>
              <span style={{color:'#3a3028',fontSize:10}}>⚙</span>
            </button>
          </div>

          {/* Insight map */}
          <div style={{flex:1,overflowY:'auto',padding:'14px 4px 14px'}}>
            <div style={{fontSize:10,color:'#3a3028',letterSpacing:'0.12em',textTransform:'uppercase',padding:'0 12px',marginBottom:10}}>
              洞见地图 {unlocked.length}/{insights.length}
            </div>
            {insights.map((ins,i)=>{
              const status=unlocked.includes(ins.id)?'done':i===curIdx?'active':'locked';
              return <InsightNode key={ins.id} ins={ins} status={status} index={i}/>;
            })}
            {allDone&&(

                <div style={{fontSize:18,marginBottom:4}}>✦</div>
                <div style={{fontSize:12,color:'#c4a84a',fontWeight:600}}>全部洞见已解锁</div>

              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{padding:'12px 16px',borderTop:'1px solid #1e1c18',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:10,color:'#2e2820',textAlign:'center'}}>{msgs.length} 轮对话 · 自动保存</div>
            <button onClick={goHome}
              style={{padding:'7px',background:'transparent',border:'1px solid #1e1c18',borderRadius:8,color:'#3a3428',fontSize:12}}>
              ← 返回首页
            </button>
          </div>
        </div>

        {/* Chat area */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Top bar */}
          <div style={{padding:'12px 24px',borderBottom:'1px solid #1e1c18',background:'#0e0c0a',display:'flex',alignItems:'center',gap:12}}>
            {!allDone&&insights[curIdx]&&(
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'#c4956a',animation:'breathe 2s ease-in-out infinite'}}/>
                <span style={{fontSize:12,color:'#7a6840'}}>正在探索</span>
                <span style={{fontSize:12,color:'#c4956a',fontFamily:"'Lora',serif",fontStyle:'italic'}}>"{insights[curIdx].title}"</span>
              </div>
            )}
            {allDone&&<div style={{fontSize:12,color:'#8a7040'}}>✦ 全部 {insights.length} 个洞见已解锁</div>}
            {newInsights.length>0&&(
              <div className="slide-up" style={{marginLeft:'auto',padding:'4px 12px',background:'#2a2010',border:'1px solid #6b5a2a',borderRadius:20,fontSize:11,color:'#c4a84a'}}>
                ✦ 洞见解锁！
              </div>
            )}
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'24px',display:'flex',flexDirection:'column',gap:18}}>
            {msgs.map((m,i)=>(
              <div key={i} className="slide-up" style={{display:'flex',alignItems:'flex-end',gap:12,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&(
                  <div style={{width:28,height:28,flexShrink:0,background:'linear-gradient(135deg,#1e1a0e,#2a2010)',borderRadius:'50%',border:'1px solid #3a2e18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#c4956a',marginBottom:2}}>✦</div>
                )}
                <div style={{maxWidth:'72%',padding:'12px 16px',borderRadius:m.role==="user"?'16px 16px 4px 16px':'16px 16px 16px 4px',fontSize:14,lineHeight:1.75,...(m.role==="user"
                  ?{background:'#1a1810',border:'1px solid #2e2820',color:'#c8c0a8'}
                  :{background:'#141210',border:'1px solid #1e1c18',color:'#ddd5c5'})}}>
                  {m.role==="assistant"?React.createElement(FmtMsg,{text:m.content}):<span style={{whiteSpace:'pre-wrap'}}>{m.content}</span>}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:'flex',alignItems:'flex-end',gap:12}}>
                <div style={{width:28,height:28,flexShrink:0,background:'linear-gradient(135deg,#1e1a0e,#2a2010)',borderRadius:'50%',border:'1px solid #3a2e18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#c4956a'}}>✦</div>
                <div style={{background:'#141210',border:'1px solid #1e1c18',borderRadius:'16px 16px 16px 4px',padding:'14px 18px',display:'flex',gap:5,alignItems:'center'}}>
                  {[0,.25,.5].map((d,i)=><span key={i} style={{width:5,height:5,borderRadius:'50%',background:'#4a3a20',display:'inline-block',animation:'pulse3 1.4s ease-in-out '+d+'s infinite'}}/>)}
                </div>
              </div>
            )}
            {err&&<div style={{padding:'10px 16px',background:'#1e1010',border:'1px solid #4a2020',borderRadius:10,fontSize:12,color:'#c06060'}}>⚠ {err}</div>}
            <div ref={endRef}/>
          </div>

          {/* Input */}
          <div style={{padding:'16px 24px',borderTop:'1px solid #1e1c18',background:'#0e0c0a'}}>
            <div style={{display:'flex',gap:10,alignItems:'flex-end',background:'#141210',border:'1px solid '+(input.trim()?'#3a2e18':'#1e1c18'),borderRadius:14,padding:'10px 10px 10px 16px',transition:'border-color .2s'}}>
              <textarea ref={taRef}
                style={{flex:1,background:'transparent',border:'none',color:'#ddd5c5',fontSize:14,lineHeight:1.65,resize:'none',fontFamily:'inherit',maxHeight:120}}
                placeholder="写下你的想法… (Enter 发送，Shift+Enter 换行)"
                value={input} onChange={e=>{setInput(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,120)+'px';}}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
                rows={1}/>
              <button onClick={send} disabled={!input.trim()||loading}
                style={{width:36,height:36,borderRadius:10,border:'none',background:input.trim()&&!loading?'linear-gradient(135deg,#8a7040,#c4956a)':'#1e1c18',color:input.trim()&&!loading?'#0e0c0a':'#3a3028',fontSize:16,fontWeight:700,flexShrink:0,transition:'all .2s'}}>
                ↑
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Home screen ─────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:'100vh',background:'#0e0c0a'}}>

                  <span>{t.ic}</span>{t.lb}
                </button>
              ))}
            </div>
            <div style={{background:'#0e0c0a',border:'1px solid #1e1c18',borderRadius:'0 0 12px 12px',padding:14}}>
              {tab==='text'&&<>
                <textarea style={{width:'100%',background:'transparent',border:'none',color:'#ddd5c5',fontSize:13,lineHeight:1.8,resize:'vertical',fontFamily:'inherit',minHeight:120}}
                  placeholder="粘贴文章、教材、研究报告、会议记录…任何你想深度消化的内容"
                  value={txt} onChange={e=>setTxt(e.target.value)}/>
                <div style={{textAlign:'right',fontSize:10,color:'#2e2820',marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{txt.length.toLocaleString()} 字</div>

          </div>

            <button onClick={()=>setShowCfg(true)} style={{background:'none',border:'1px solid #4a3010',borderRadius:8,color:'#a07030',fontSize:12,padding:'4px 10px'}}>配置 →</button>
          </div>}

          {(step||err)&&<div style={{marginBottom:16,padding:'10px 16px',background:err?'#1a0808':'#1a1408',border:'1px solid '+(err?'#4a2020':'#4a3a10'),borderRadius:10,fontSize:12,color:err?'#c06060':'#a08040',display:'flex',alignItems:'center',gap:8}}>
            {!err&&<span style={{animation:'breathe 1.5s ease-in-out infinite',fontSize:14}}>◌</span>}
            {err||step}
          </div>}

          <button onClick={startSession} disabled={!canStart||loading}
            style={{width:'100%',padding:'14px',background:canStart&&!loading?'linear-gradient(135deg,#6a5020,#c4956a)':'#1a1810',border:'none',borderRadius:12,color:canStart&&!loading?'#0e0c0a':'#3a3028',fontSize:15,fontWeight:700,fontFamily:"'Lora',serif",letterSpacing:'0.03em',transition:'all .3s',boxShadow:canStart&&!loading?'0 4px 24px rgba(196,149,106,.2)':'none'}}>
            {loading?step||"处理中…":"✦ 开始深度学习对话"}
          </button>
        </div>

        {/* History */}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:13,color:'#5a5040',fontFamily:"'Lora',serif"}}>历史会话</span>
              <span style={{fontSize:11,color:'#2e2820',background:'#141210',padding:'2px 9px',borderRadius:10,border:'1px solid #1e1c18',fontFamily:"'JetBrains Mono',monospace"}}>{sessions.length}</span>
            </div>
            {sessions.length>0&&<button onClick={()=>{if(window.confirm("清空所有历史？")){{ls.set(K_SES,[]);setSessions([])}}}}
              style={{background:'none',border:'none',color:'#2e2820',fontSize:11}}>清空全部</button>}
          </div>
          {sessions.length===0
            ?<div style={{padding:36,textAlign:'center',background:'#0f0d0b',borderRadius:14,border:'1px dashed #1e1c18'}}>
               <div style={{fontSize:24,marginBottom:10,color:'#2e2820'}}>◌</div>
               <div style={{fontSize:13,color:'#3a3428'}}>还没有学习记录</div>
               <div style={{fontSize:11,color:'#2a2420',marginTop:5}}>每次对话结束后自动保存，随时可以继续</div>
             </div>
            :<div style={{display:'flex',flexDirection:'column',gap:10}}>
               {sessions.map(s=><SCard key={s.id} s={s} onResume={resume} onDel={delSession}/>)}
             </div>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
