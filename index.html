// ── LocalStorage helpers ──────────────────────────────────────────────────────
const LS_SESSIONS="sq_sessions";
const LS_CONFIG="sq_config";
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function getSessions(){return lsGet(LS_SESSIONS)||[]}
function getConfig(){return lsGet(LS_CONFIG)||{provider:"anthropic",model:"claude-sonnet-4-20250514",keys:{}}}
function upsertSession(s){
  const list=getSessions();
  const i=list.findIndex(x=>x.id===s.id);
  const rec={...s,updatedAt:Date.now()};
  if(i>=0)list[i]=rec;else list.unshift(rec);
  lsSet(LS_SESSIONS,list);
}
function removeSession(id){lsSet(LS_SESSIONS,getSessions().filter(s=>s.id!==id))}
function mkId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ── API ───────────────────────────────────────────────────────────────────────
async function callAI(prov,key,model,sys,msgs){
  const mm=msgs.map(m=>({role:m.role,content:m.content}));
  if(prov==="anthropic"){
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model,max_tokens:1200,system:sys,messages:mm})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.content[0].text;
  }
  if(prov==="openai"){
    const r=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model,max_tokens:1200,messages:[{role:"system",content:sys},...mm]})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.choices[0].message.content;
  }
  if(prov==="gemini"){
    const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:msgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),generationConfig:{maxOutputTokens:1200}})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  }
  if(prov==="deepseek"){
    const r=await fetch("https://api.deepseek.com/chat/completions",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model,max_tokens:1200,messages:[{role:"system",content:sys},...mm]})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.choices[0].message.content;
  }
  throw new Error("Unknown provider");
}

// ── Phase/level detection ─────────────────────────────────────────────────────
function detectPhase(text,mode,curPhase,curBloom,curDeepen){
  const c=text.replace(/\*+/g,"").replace(/_{2,}/g,"").replace(/-{3,}/g,"").replace(/\s+/g," ");
  let newPhase=curPhase,newBloom=curBloom,newDeepen=curDeepen;
  if(mode==="new"){
    if(curPhase==="activate"&&(c.includes("开始进入内容")||c.includes("进入内容")||c.includes("我们开始进入")))newPhase="read";
    if((curPhase==="read"||curPhase==="activate")&&(c.includes("走完了全部")||c.includes("深化一下")||c.includes("全部内容")))newPhase="deepen";
  }
  const bmap={"记忆":1,"理解":2,"应用":3,"分析":4,"评估":5,"创造":6};
  for(const [k,v] of Object.entries(bmap)){
    if(c.includes("进入了"+k)||c.includes("进入"+k+"层")||(c.includes(k+"层")&&c.includes("进入"))){
      if(mode==="review")newBloom=v;
      else{newDeepen=v;newPhase="deepen";}
      break;
    }
  }
  return{newPhase,newBloom,newDeepen};
}

// ── File parsers ──────────────────────────────────────────────────────────────
async function loadPdfJs(){
  if(window.pdfjsLib)return window.pdfjsLib;
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res(window.pdfjsLib);};
    s.onerror=rej;document.head.appendChild(s);
  });
}
async function parsePdf(f){
  const lib=await loadPdfJs();const pdf=await lib.getDocument({data:await f.arrayBuffer()}).promise;
  let t="";for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(" ")+"\n";}
  return t.trim();
}
async function parseDocx(f){const r=await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()});return r.value.trim();}
async function parseTxt(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(f,"UTF-8");});}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return"刚刚";if(d<3600)return Math.floor(d/60)+"分钟前";
  if(d<86400)return Math.floor(d/3600)+"小时前";if(d<604800)return Math.floor(d/86400)+"天前";
  return new Date(ts).toLocaleDateString("zh-CN",{month:"short",day:"numeric"});
}
function ficon(n){return{pdf:"📄",docx:"📝",doc:"📝",txt:"📃",md:"📋"}[n.split(".").pop().toLowerCase()]||"📁"}
function FmtMsg({text}){
  const parts=text.split(/(「[^」]*」)/g);
  return React.createElement("div",null,parts.map((p,i)=>
    p.startsWith("「")&&p.endsWith("」")
      ?React.createElement("div",{key:i,className:"cblock"},p.slice(1,-1))
      :React.createElement("span",{key:i,style:{whiteSpace:"pre-wrap"}},p)
  ));
}
function progLabel(s){
  if(s.mode==="review")return BLOOM[Math.min((s.bloom||1)-1,5)].name+"层";
  if(s.nphase==="deepen")return"高阶·"+BLOOM[Math.min((s.deepen||3)-1,5)].name+"层";
  return(NPHASES.find(p=>p.id===s.nphase)||NPHASES[0]).name;
}
function progColor(s){
  if(s.mode==="review")return BLOOM[Math.min((s.bloom||1)-1,5)].color;
  return(NPHASES.find(p=>p.id===s.nphase)||NPHASES[0]).color;
}

  const last=s.messages&&s.messages.length>0?s.messages[s.messages.length-1]:null;

            <span style={{fontSize:10,color:"#5a5248"}}>{(s.messages||[]).length} 条消息</span>
            <span style={{fontSize:10,color:pv.color}}>{pv.icon}</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <span style={{fontSize:10,color:"#4a4438"}}>{fmtDate(s.updatedAt)}</span>
          {!confirm
            ?<button onClick={()=>setConfirm(true)} style={{background:"none",border:"none",color:"#3a3028",cursor:"pointer",fontSize:11}}>删除</button>
            :<div style={{display:"flex",gap:6,alignItems:"center"}}>
               <span style={{fontSize:10,color:"#8a4040"}}>确认?</span>
               <button onClick={()=>{onDel(s.id);setConfirm(false);}} style={{background:"none",border:"none",color:"#c06060",cursor:"pointer",fontSize:11}}>是</button>
               <button onClick={()=>setConfirm(false)} style={{background:"none",border:"none",color:"#5a5248",cursor:"pointer",fontSize:11}}>否</button>

    </div>
  );
}

      messages:newMsgs,nphase:np,bloom:bl,bloomH:blh,deepen:dp,
      provider:cfg.provider,model:cfg.model,
      createdAt:getSessions().find(x=>x.id===id)&&getSessions().find(x=>x.id===id).createdAt||Date.now(),
      updatedAt:Date.now(),
    };
    upsertSession(s);
    setSessions(getSessions());
  }

  async function startChat(){
    setErr("");
    if(!apiKey){setShowCfg(true);return;}
    setBusy(true);setBusyMsg("准备内容…");
    try{
      let c="";
      if(tab==="text") c=txt;
      else if(tab==="url"){
        setBusyMsg("读取链接…");
        const r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
        const d=await r.json();
        const tmp=document.createElement("div");tmp.innerHTML=d.contents;
        ["script","style","nav","header","footer","aside"].forEach(t=>tmp.querySelectorAll(t).forEach(e=>e.remove()));
        c=tmp.innerText.replace(/\n{3,}/g,"\n\n").trim();
      }else if(tab==="file"&&file){
        setBusyMsg("解析文件…");
        const ext=file.name.split(".").pop().toLowerCase();
        if(ext==="pdf")c=await parsePdf(file);
        else if(ext==="docx"||ext==="doc")c=await parseDocx(file);
        else c=await parseTxt(file);
      }
      if(!c.trim())throw new Error("内容为空");
      setBusyMsg("启动对话…");
      const sys=mode==="new"?P_NEW(c):P_REVIEW(c);
      const reply=await callAI(cfg.provider,apiKey,cfg.model,sys,[{role:"user",content:"开始吧"}]);
      const det=detectPhase(reply,mode,"activate",1,3);
      const initMsgs=[{role:"assistant",content:reply}];
      const newId=mkId();
      setSid(newId);setContent(c);setMsgs(initMsgs);
      setNphase(det.newPhase);setBloom(det.newBloom);setBloomH([det.newBloom]);setDeepen(det.newDeepen);
      persist(newId,initMsgs,det.newPhase,det.newBloom,[det.newBloom],det.newDeepen,subj,c,mode);
      setScreen("chat");
    }catch(e){setErr(e.message);}
    setBusy(false);setBusyMsg("");
  }

  async function send(){
    if(!input.trim()||loading)return;
    const um={role:"user",content:input};
    const next=[...msgs,um];
    setMsgs(next);setInput("");setLoading(true);setErr("");
    const sys=P_RESUME(content);
    try{
      const reply=await callAI(cfg.provider,apiKey,cfg.model,sys,next);
      const det=detectPhase(reply,mode,nphase,bloom,deepen);
      setNphase(det.newPhase);setBloom(det.newBloom);setBloomH(h=>[...new Set([...h,det.newBloom])]);setDeepen(det.newDeepen);
      const full=[...next,{role:"assistant",content:reply}];
      setMsgs(full);
      persist(sid,full,det.newPhase,det.newBloom,[...new Set([...bloomH,det.newBloom])],det.newDeepen,subj,content,mode);
    }catch(e){
      setErr(e.message);
      setMsgs(p=>[...p,{role:"assistant",content:"⚠ "+e.message}]);
    }
    setLoading(false);
  }

  function resume(s){
    setSid(s.id);setContent(s.content);setSubj(s.subject||"");setMode(s.mode);
    setMsgs(s.messages||[]);setNphase(s.nphase||"activate");
    setBloom(s.bloom||1);setBloomH(s.bloomH||[1]);setDeepen(s.deepen||3);
    setErr("");setScreen("chat");
  }

  function goHome(){
    setScreen("home");setSid(null);setMsgs([]);setErr("");
    setTxt("");setUrl("");setFile(null);setSubj("");
  }

  function delSession(id){removeSession(id);setSessions(getSessions());}

  const canStart=(tab==="text"&&txt.trim())||(tab==="url"&&url.trim())||(tab==="file"&&file);
  const curBloom=BLOOM[(bloom||1)-1]||BLOOM[0];
  const curDeepen=BLOOM[(deepen||3)-1]||BLOOM[2];

  if(showCfg) return <Settings cfg={cfg} setCfg={setCfg} onClose={()=>setShowCfg(false)}/>;

  // ── Chat screen ──
  if(screen==="chat"){
    const isNew=mode==="new";
    const phInfo={activate:{color:"#9EBA8A",text:"激活先验 — 连接你已有的认知",icon:"◌"},read:{color:"#8FA8C8",text:"分块阅读 — 逐段接触新知识",icon:"◎"},deepen:{color:"#D4B86A",text:"高阶深化 — "+curDeepen.name+"层",icon:"✦"}};
    const pi=phInfo[nphase]||phInfo.activate;
    return(
      <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:216,background:"#0f0e0b",borderRight:"1px solid #2e2a22",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
          <div style={{padding:"13px 14px",borderBottom:"1px solid #2e2a22",display:"flex",alignItems:"center",gap:7}}>
            <span style={{color:"#D4B86A",fontSize:14}}>✦</span>
            <span style={{fontSize:12,color:"#c8bfa8",fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj||"学习会话"}</span>
            <button onClick={()=>setShowCfg(true)} style={{background:"none",border:"none",color:prov.color,fontSize:13,cursor:"pointer",padding:2}}>{prov.icon}</button>
          </div>
          <div style={{padding:"10px 14px 0"}}>
            <div style={{fontSize:11,padding:"4px 10px",borderRadius:10,textAlign:"center",...(isNew?{background:"#9EBA8A18",color:"#9EBA8A",border:"1px solid #9EBA8A33"}:{background:"#D4B86A18",color:"#D4B86A",border:"1px solid #D4B86A33"})}}>
              {isNew?"◌ 新学模式":"◆ 复习模式"}
            </div>
          </div>
          <div style={{padding:"12px 0",flex:1}}>
            <div style={{fontSize:10,color:"#3a3428",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 14px 8px"}}>{isNew?"学习阶段":"Bloom层次"}</div>
            {isNew?(
              <>
                {NPHASES.map(ph=>{const myI=NPHASES.findIndex(x=>x.id===ph.id);const curI=NPHASES.findIndex(x=>x.id===nphase);const act=ph.id===nphase;const done=myI<curI;return(
                  <div key={ph.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 14px",background:act?ph.bg:"transparent",borderLeft:act?"3px solid "+ph.color:"3px solid transparent",opacity:done?0.4:act?1:0.22,transition:"all .3s"}}>
                    <span style={{color:ph.color,fontSize:15,width:18,textAlign:"center"}}>{ph.icon}</span>
                    <div><div style={{fontSize:12,color:act?ph.color:"#9a9585",fontWeight:500}}>{ph.name}{done?" ✓":""}</div><div style={{fontSize:10,color:"#4a4438"}}>{ph.desc}</div></div>
                  </div>
                );})}
                {nphase==="deepen"&&<div style={{marginTop:8,marginLeft:14,paddingLeft:8,borderLeft:"1px solid #2e2a22"}}>
                  <div style={{fontSize:9,color:"#3a3428",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 8px 6px"}}>Bloom高阶</div>
                  {BLOOM.slice(2).map(l=>{const act=deepen===l.id;const done=deepen>l.id;return(
                    <div key={l.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",background:act?l.bg:"transparent",borderLeft:act?"2px solid "+l.color:"2px solid transparent",opacity:done?0.4:act?1:0.22}}>
                      <span style={{color:l.color,fontSize:12}}>{l.icon}</span>
                      <div style={{fontSize:11,color:act?l.color:"#7a7060"}}>{l.name}{done?" ✓":""}</div>
                    </div>
                  );})}
                </div>}
              </>
            ):BLOOM.map(l=>{const act=bloom===l.id;const done=bloomH.includes(l.id)&&bloom>l.id;return(
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 14px",background:act?l.bg:"transparent",borderLeft:act?"3px solid "+l.color:"3px solid transparent",opacity:done?0.4:act?1:0.22,transition:"all .3s"}}>
                <span style={{color:l.color,fontSize:14,width:18,textAlign:"center"}}>{l.icon}</span>
                <div><div style={{fontSize:12,color:act?l.color:"#9a9585",fontWeight:500}}>{l.name}{done?" ✓":""}</div><div style={{fontSize:10,color:"#4a4438"}}>{l.desc}</div></div>
              </div>
            );})}
          </div>
          <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontSize:10,color:"#3a3428",textAlign:"center"}}>{msgs.length} 条 · 自动保存 ✓</div>
            <button onClick={goHome} style={{padding:"7px 12px",background:"transparent",border:"1px solid #2e2a22",borderRadius:8,color:"#4a4438",fontSize:12,cursor:"pointer"}}>← 返回首页</button>
          </div>
        </div>
        {/* Chat */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 20px",borderBottom:"1px solid #2e2a22",background:"#13110e"}}>
            {isNew
              ?<div style={{fontSize:12,padding:"4px 14px",borderRadius:20,display:"inline-block",background:pi.color+"15",color:pi.color,border:"1px solid "+pi.color+"33"}}>{pi.icon} {pi.text}</div>
              :<div style={{fontSize:12,padding:"4px 14px",borderRadius:20,display:"inline-block",background:curBloom.bg,color:curBloom.color,border:"1px solid "+curBloom.color+"33"}}>{curBloom.icon} {curBloom.name}层 — {curBloom.desc}</div>
            }
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"18px 20px",display:"flex",flexDirection:"column",gap:14}}>
            {msgs.map((m,i)=>(
              <div key={i} className="msg-enter" style={{display:"flex",alignItems:"flex-end",gap:9,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&<div style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,background:"#1c1a16",borderRadius:"50%",border:"1px solid #2e2a22",color:"#D4B86A"}}>✦</div>}
                <div style={{maxWidth:"76%",padding:"11px 15px",borderRadius:12,fontSize:14,lineHeight:1.75,...(m.role==="user"?{background:"#252018",border:"1px solid #3a3020",color:"#d4c9b0",borderBottomRightRadius:4,whiteSpace:"pre-wrap"}:{background:"#1c1a16",border:"1px solid #2e2a22",color:"#e8e0d0",borderBottomLeftRadius:4})}}>
                  {m.role==="assistant"?React.createElement(FmtMsg,{text:m.content}):m.content}
                </div>
              </div>
            ))}
            {loading&&<div style={{display:"flex",alignItems:"flex-end",gap:9}}>
              <div style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,background:"#1c1a16",borderRadius:"50%",border:"1px solid #2e2a22",color:"#D4B86A"}}>✦</div>
              <div style={{background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:"12px 12px 12px 4px",padding:"14px 18px",display:"flex",gap:4}}>
                {[0,.2,.4].map((d,i)=><span key={i} style={{display:"inline-block",width:6,height:6,background:"#5a5248",borderRadius:"50%",animation:"pulse 1.4s ease-in-out "+d+"s infinite"}}/>)}
              </div>
            </div>}
            {err&&<div style={{padding:"10px 14px",background:"#2a1218",border:"1px solid #5a2a30",borderRadius:10,fontSize:12,color:"#c06070"}}>⚠ {err}</div>}
            <div ref={endRef}/>
          </div>
          <div style={{padding:"12px 20px",borderTop:"1px solid #2e2a22",display:"flex",gap:9,alignItems:"flex-end",background:"#13110e"}}>
            <textarea style={{flex:1,background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:10,padding:"9px 13px",color:"#e8e0d0",fontSize:14,lineHeight:1.6,resize:"none",fontFamily:"inherit"}}
              placeholder="输入你的回答… (Enter发送，Shift+Enter换行)"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={2}/>
            <button onClick={send} disabled={!input.trim()||loading}
              style={{width:38,height:38,borderRadius:9,border:"none",background:"#D4B86A",color:"#13110e",fontSize:17,fontWeight:700,cursor:"pointer",flexShrink:0,opacity:input.trim()&&!loading?1:.3}}>↑</button>
          </div>
        </div>
      </div>
    );
  }

  // ── Home screen ──
  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{maxWidth:700,margin:"0 auto",padding:"44px 24px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:24,color:"#D4B86A",marginBottom:12}}>✦</div>
          <h1 style={{fontSize:30,fontWeight:700,color:"#f0e8d8",fontFamily:"'Crimson Pro',serif",letterSpacing:"0.04em",marginBottom:8}}>苏格拉底导师</h1>
          <p style={{fontSize:13,color:"#7a7060",lineHeight:1.8}}>通过对话引导你自己构建知识，而非被动接受灌输</p>
        </div>
        {/* Model button */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
          <button onClick={()=>setShowCfg(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px",background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:20,color:"#9a9080",fontSize:12,cursor:"pointer"}}>
            <span style={{color:prov.color}}>{prov.icon}</span>
            <span>{prov.name} · {prov.models.find(m=>m.id===cfg.model)?prov.models.find(m=>m.id===cfg.model).lb:cfg.model}</span>
            <span style={{color:"#4a4438",fontSize:10}}>⚙</span>
          </button>
        </div>

        {/* New session */}
        <div style={{background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:16,padding:28,marginBottom:28}}>
          {/* Mode */}
          <div style={{marginBottom:22}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>学习模式</div>
            <div style={{display:"flex",gap:10}}>
              {[{id:"new",icon:"◌",title:"新学模式",desc:"第一次接触这个内容",color:"#9EBA8A",steps:["激活先验知识","AI分块带你阅读","苏格拉底式消化","Bloom高阶深化"]},
                {id:"review",icon:"◆",title:"复习模式",desc:"已读过，想深化理解",color:"#D4B86A",steps:["记忆层提问","理解层追问","逐层递进至创造"]}].map(m=>(
                <div key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:"12px",borderRadius:12,cursor:"pointer",border:"1.5px solid "+(mode===m.id?m.color+"55":"#2e2a22"),background:mode===m.id?m.color+"0d":"#13110e"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <span style={{color:mode===m.id?m.color:"#5a5248"}}>{m.icon}</span>
                    <span style={{fontSize:13,fontWeight:600,color:mode===m.id?m.color:"#7a7060"}}>{m.title}</span>
                    {mode===m.id&&<span style={{marginLeft:"auto",fontSize:10,color:m.color}}>●</span>}
                  </div>
                  <p style={{fontSize:11,color:"#6a6050",marginBottom:7}}>{m.desc}</p>
                  {m.steps.map((s,i)=><div key={i} style={{display:"flex",gap:5}}><span style={{fontSize:9,color:mode===m.id?m.color+"99":"#3a3428"}}>{i+1}.</span><span style={{fontSize:11,color:mode===m.id?"#b0a890":"#4a4438"}}>{s}</span></div>)}
                </div>
              ))}
            </div>
          </div>
          {/* Subject */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>学习主题（选填）</div>
            <input style={{width:"100%",background:"#13110e",border:"1px solid #2e2a22",borderRadius:8,padding:"10px 14px",color:"#e8e0d0",fontSize:13,fontFamily:"inherit"}}
              placeholder="例如：MCP协议、牛顿第二定律…" value={subj} onChange={e=>setSubj(e.target.value)}/>
          </div>
          {/* Content */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>学习内容来源</div>
            <div style={{display:"flex",gap:2,background:"#13110e",borderRadius:"10px 10px 0 0",border:"1px solid #2e2a22",borderBottom:"none",padding:4}}>
              {[{id:"text",label:"文本粘贴",icon:"✎"},{id:"url",label:"链接",icon:"⊕"},{id:"file",label:"文件",icon:"⊞"}].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"7px 0",background:tab===t.id?"#2a2820":"transparent",border:"none",borderRadius:7,color:tab===t.id?"#c8b890":"#5a5248",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span>{t.icon}</span>{t.label}
                </button>
              ))}
            </div>
            <div style={{background:"#13110e",border:"1px solid #2e2a22",borderRadius:"0 0 10px 10px",padding:14}}>
              {tab==="text"&&<>
                <textarea style={{width:"100%",background:"transparent",border:"none",color:"#e8e0d0",fontSize:13,lineHeight:1.75,resize:"vertical",fontFamily:"inherit"}}
                  placeholder="将文章、教材、笔记粘贴到这里…" value={txt} onChange={e=>setTxt(e.target.value)} rows={8}/>
                <div style={{textAlign:"right",fontSize:10,color:"#3a3428",marginTop:4}}>{txt.length} 字符</div>
              </>}
              {tab==="url"&&<>
                <p style={{fontSize:12,color:"#6a6050",marginBottom:8}}>自动提取网页正文内容</p>
                <input style={{width:"100%",background:"#13110e",border:"1px solid #2e2a22",borderRadius:8,padding:"10px 14px",color:"#e8e0d0",fontSize:13,fontFamily:"inherit"}}
                  placeholder="https://…" value={url} onChange={e=>setUrl(e.target.value)}/>
              </>}
              {tab==="file"&&<>
                <div style={{border:"1.5px dashed "+(drag?"#D4B86A":"#2e2a22"),background:drag?"#D4B86A08":"transparent",borderRadius:10,padding:28,textAlign:"center",cursor:"pointer"}}
                  onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
                  onDrop={e=>{e.preventDefault();setDrag(false);setFile(e.dataTransfer.files[0]);}}
                  onClick={()=>fileRef.current&&fileRef.current.click()}>
                  {file
                    ?<div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center"}}>
                       <span style={{fontSize:26}}>{ficon(file.name)}</span>
                       <div style={{textAlign:"left"}}><div style={{fontSize:13,color:"#c8b890",fontWeight:500}}>{file.name}</div><div style={{fontSize:11,color:"#5a5248"}}>{(file.size/1024).toFixed(1)} KB</div></div>
                       <button style={{background:"none",border:"1px solid #3a3428",borderRadius:"50%",color:"#5a5248",width:22,height:22,cursor:"pointer",fontSize:14,lineHeight:1}} onClick={e=>{e.stopPropagation();setFile(null);}}>×</button>
                     </div>
                    :<><div style={{fontSize:28,color:"#4a4438",marginBottom:8}}>⊞</div><div style={{fontSize:13,color:"#9a9585",marginBottom:4}}>拖拽或点击选择文件</div><div style={{fontSize:11,color:"#4a4438"}}>PDF · DOCX · TXT · Markdown</div></>
                  }
                </div>
                <input ref={fileRef} type="file" accept=".txt,.pdf,.docx,.doc,.md" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/>
              </>}
            </div>
          </div>
          {!apiKey&&<div style={{marginBottom:14,padding:"10px 14px",background:"#2a1a12",border:"1px solid #5a3a2a",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#c08060"}}>⚠ 需要先配置 API Key</span>
            <button onClick={()=>setShowCfg(true)} style={{background:"none",border:"1px solid #5a3a2a",borderRadius:8,color:"#c08060",fontSize:12,padding:"4px 10px",cursor:"pointer"}}>配置 →</button>
          </div>}
          {(busyMsg||err)&&<div style={{marginBottom:14,padding:"8px 14px",background:err?"#2a1218":"#D4B86A0a",border:"1px solid "+(err?"#5a2a30":"#D4B86A22"),borderRadius:8,fontSize:12,color:err?"#c06070":"#D4B86A",textAlign:"center"}}>{err||busyMsg}</div>}
          <button onClick={startChat} disabled={!canStart||busy}
            style={{width:"100%",padding:14,background:"#D4B86A",color:"#13110e",border:"none",borderRadius:10,fontSize:15,fontWeight:700,letterSpacing:"0.05em",opacity:canStart&&!busy?1:.35,cursor:canStart&&!busy?"pointer":"not-allowed"}}>
            {busy?"处理中…":"开始"+(mode==="new"?"新学":"复习")+"对话 →"}
          </button>
        </div>

        {/* History */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,color:"#7a7060",display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:"#4a4438"}}>◫</span> 学习历史记录
              <span style={{fontSize:11,color:"#3a3428",background:"#1c1a16",padding:"2px 8px",borderRadius:10,border:"1px solid #2e2a22"}}>{sessions.length} 个会话</span>
            </div>
            {sessions.length>0&&<button onClick={()=>{if(window.confirm("确认清空所有历史？")){lsSet(LS_SESSIONS,[]);setSessions([]);}}}
              style={{background:"none",border:"none",color:"#3a3028",cursor:"pointer",fontSize:12}}>清空全部</button>}
          </div>
          {sessions.length===0
            ?<div style={{padding:28,textAlign:"center",color:"#3a3428",fontSize:13,background:"#1a1814",borderRadius:12,border:"1px dashed #2a2620"}}>
               <div style={{fontSize:22,marginBottom:8}}>◫</div>
               <div>还没有学习记录</div>
               <div style={{fontSize:11,marginTop:4,color:"#2a2420"}}>开始一次对话后，会话会自动保存在这里</div>
             </div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
               {sessions.map(s=><SCard key={s.id} s={s} onResume={resume} onDel={delSession}/>)}
             </div>
          }
        </div>
      </div>
    </div>
  );
}
