// ── Session storage ───────────────────────────────────────────────────────────
const SESSIONS_KEY = "socratic_sessions";

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || []; }
  catch { return []; }
}
function persistSessions(sessions) {
  localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
}
function saveSession(session) {
  const sessions = loadSessions();
  const idx = sessions.findIndex(s => s.id === session.id);
  const updated = { ...session, updatedAt: Date.now() };
  if (idx >= 0) sessions[idx] = updated; else sessions.unshift(updated);
  persistSessions(sessions);
}
function deleteSession(id) {
  persistSessions(loadSessions().filter(s => s.id !== id));
}
function newSessionId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── Prompts ───────────────────────────────────────────────────────────────────
const NEW_PROMPT = (content) => `你是一位苏格拉底式引导导师，专门帮助学生第一次接触新知识。

【学习材料（仅你可见，学生尚未阅读）】
${content}

【核心教学原则】
这位学生是第一次接触这个内容，不能用"记忆层"提问——他们什么都还不知道。
正确方式：你主动引导他们一步步发现知识，而不是考察他们已知的内容。

【三阶段流程，严格按顺序执行】

▌第一阶段：激活先验（1-2轮）
- 激活学生已有的相关认知，建立"锚点"
- 提问风格："在接触这个内容之前，你对[主题]有什么印象或联想？"
- 不评判对错，完成后说"好，我们开始进入内容。"

▌第二阶段：分块阅读 + 苏格拉底消化（核心阶段）
- 将学习材料拆成3-5个逻辑块
- 每次只呈现一块，用「」括起内容，与你的话区分
- 呈现后立即提问帮助消化
- 根据回答追问，理解扎实后再展示下一块
- 全部块读完后说"我们已经走完了全部内容，现在来深化一下。"

▌第三阶段：高阶深化（Bloom应用层以上）
- 理解和记忆已在阅读中建立，跳过这两层
- 按顺序：应用→分析→评估→创造
- 升层时明确说"我们进入了[层次名]层"

【通用规则】
- 每次只问一个问题，等待回答
- 绝不直接给出完整答案，用追问、类比、反例引导学生自己发现
- 对回答的评价必须客观、直接，严格区分对错：
  * 回答正确：简短确认（1句话），立刻追问更深
  * 回答部分正确：明确指出哪里对、哪里不准确，然后追问
  * 回答错误：直接指出这个理解不准确，不赞美，用反问引导重新思考
- 禁止空洞赞美：不说非常好！你说得很棒！你的判断很准确！等套话
- 禁止讨好：即使学生回答很差，也不找补优点
- 语气：平静、专注、像一个严谨的同伴，而不是一个鼓励型教练

现在开始。执行第一阶段：激活先验。`;

// ── API ───────────────────────────────────────────────────────────────────────
async function callAI(provider, apiKey, model, systemPrompt, messages) {
  if (provider === "anthropic") {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({ model, max_tokens:1200, system:systemPrompt, messages:messages.map(m=>({role:m.role,content:m.content})) }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content?.[0]?.text || "";
  }
  if (provider === "openai") {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({ model, max_tokens:1200, messages:[{role:"system",content:systemPrompt},...messages.map(m=>({role:m.role,content:m.content}))] }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices?.[0]?.message?.content || "";
  }
  if (provider === "gemini") {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ system_instruction:{parts:[{text:systemPrompt}]}, contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})), generationConfig:{maxOutputTokens:1200} }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
  }
  if (provider === "deepseek") {
    const res = await fetch("https://api.deepseek.com/chat/completions", {
      method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({ model, max_tokens:1200, messages:[{role:"system",content:systemPrompt},...messages.map(m=>({role:m.role,content:m.content}))] }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices?.[0]?.message?.content || "";
  }
  throw new Error("Unknown provider: " + provider);
}

// ── File parsers ──────────────────────────────────────────────────────────────
async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  return new Promise((res,rej) => {
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{ window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; res(window.pdfjsLib); };
    s.onerror=rej; document.head.appendChild(s);
  });
}
async function parsePdf(file) {
  const lib=await loadPdfJs(); const pdf=await lib.getDocument({data:await file.arrayBuffer()}).promise;
  let t=""; for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(" ")+"\n";} return t.trim();
}
async function parseDocx(file) { const r=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()}); return r.value.trim(); }
async function parseTxt(file) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(file,"UTF-8"); }); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function fileIcon(name) { const ext=name.split(".").pop().toLowerCase(); return {pdf:"📄",docx:"📝",doc:"📝",txt:"📃",md:"📋"}[ext]||"📁"; }

function detectTransitions(text, { learningMode, newPhase, setNewPhase, setBloomLevel, setBloomHistory, setDeepenLevel }) {
  const clean = text.replace(/\*+/g,"").replace(/_{2,}/g,"").replace(/-{3,}/g,"").replace(/\s+/g," ");
  if (learningMode==="new") {
    if ((clean.includes("开始进入内容")||clean.includes("我们开始进入")||clean.includes("进入内容")) && newPhase==="activate") setNewPhase("read");
    if ((clean.includes("走完了全部")||clean.includes("深化一下")||clean.includes("全部内容")) && (newPhase==="read"||newPhase==="activate")) setNewPhase("deepen");
  }
  const bloomMap={记忆:1,理解:2,应用:3,分析:4,评估:5,创造:6};
  for(const [k,v] of Object.entries(bloomMap)){
    const triggered=clean.includes(`进入了${k}`)||clean.includes(`进入${k}层`)||(clean.includes(`${k}层`)&&clean.includes("进入"))||new RegExp(`进入.{0,6}${k}.{0,3}层`).test(clean);
    if(triggered){
      if(learningMode==="review"){ setBloomLevel(v); setBloomHistory(p=>[...new Set([...p,v])]); }
      else { setDeepenLevel(v); setNewPhase("deepen"); }
      break;
    }
  }
}

function formatDate(ts) {
  const d=new Date(ts); const now=new Date();
  const diff=now-d;
  if(diff<60000) return "刚刚";
  if(diff<3600000) return Math.floor(diff/60000)+"分钟前";
  if(diff<86400000) return Math.floor(diff/3600000)+"小时前";
  if(diff<604800000) return Math.floor(diff/86400000)+"天前";
  return d.toLocaleDateString("zh-CN",{month:"short",day:"numeric"});
}

function sessionProgressLabel(s) {
  if(s.learningMode==="review") { return BLOOM[Math.min(s.bloomLevel-1,5)].name+"层"; }
  const ph=NEW_PHASES.find(p=>p.id===s.newPhase)||NEW_PHASES[0];
  if(s.newPhase==="deepen") return "高阶深化·"+BLOOM[Math.min(s.deepenLevel-1,5)].name+"层";
  return ph.name;
}
function sessionProgressColor(s) {
  if(s.learningMode==="review") return BLOOM[Math.min(s.bloomLevel-1,5)].color;
  const ph=NEW_PHASES.find(p=>p.id===s.newPhase)||NEW_PHASES[0]; return ph.color;
}

function FormattedMsg({ text }) {
  const parts=text.split(/(「[^」]*」)/g);
  return React.createElement("div",null,
    parts.map((p,i)=> p.startsWith("「")&&p.endsWith("」")
      ? React.createElement("div",{key:i,className:"content-block"},p.slice(1,-1))
      : React.createElement("span",{key:i,style:{whiteSpace:"pre-wrap"}},p)
    )
  );
}

              {session.learningMode==="new"?"◌ 新学":"◆ 复习"} · {progLabel}
            </span>
            <span style={{fontSize:10,color:"#5a5248"}}>{msgCount} 条消息</span>
            <span style={{fontSize:10,color:"#5a5248"}}>·</span>
            <span style={{fontSize:10,color:"#5a5248",display:"flex",alignItems:"center",gap:4}}>
              <span style={{color:prov.color,fontSize:10}}>{prov.icon}</span>
              {prov.name}
            </span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <span style={{fontSize:10,color:"#4a4438"}}>{formatDate(session.updatedAt)}</span>
          {!confirmDelete
            ? <button onClick={()=>setConfirmDelete(true)} style={{background:"none",border:"none",color:"#3a3028",cursor:"pointer",fontSize:12,padding:"2px 4px"}}>删除</button>
            : <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#8a4040"}}>确认?</span>
                <button onClick={()=>{onDelete(session.id);setConfirmDelete(false);}} style={{background:"none",border:"none",color:"#c06060",cursor:"pointer",fontSize:11}}>是</button>
                <button onClick={()=>setConfirmDelete(false)} style={{background:"none",border:"none",color:"#5a5248",cursor:"pointer",fontSize:11}}>否</button>
              </div>
          }
        </div>
      </div>
      {session.messages?.length > 0 && (
        <div style={{fontSize:12,color:"#6a6050",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingTop:4,borderTop:"1px solid #2a2620"}}>
          {session.messages[session.messages.length-1]?.content?.slice(0,80)}…
        </div>
      )}
      <button onClick={()=>onResume(session)}
        style={{padding:"8px",background:"#2a2820",border:"1px solid #3a3428",borderRadius:8,color:"#c8b890",fontSize:13,cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}
        onMouseEnter={e=>{e.currentTarget.style.background="#D4B86A22";e.currentTarget.style.borderColor="#D4B86A44";e.currentTarget.style.color="#D4B86A";}}
        onMouseLeave={e=>{e.currentTarget.style.background="#2a2820";e.currentTarget.style.borderColor="#3a3428";e.currentTarget.style.color="#c8b890";}}>
        继续学习 →
      </button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const defaultConfig = {provider:"anthropic",model:"claude-sonnet-4-20250514",keys:{}};
  const [config,setConfig]     = useState(()=>{ try{return JSON.parse(localStorage.getItem("socratic_config"))||defaultConfig;}catch{return defaultConfig;} });
  const [showSettings,setShowSettings] = useState(false);

  // Page state
  const [phase,setPhase]               = useState("input"); // "input" | "learning"
  const [inputTab,setInputTab]         = useState("text");
  const [textContent,setTextContent]   = useState("");
  const [urlInput,setUrlInput]         = useState("");
  const [subject,setSubject]           = useState("");
  const [learningMode,setLearningMode] = useState("new");
  const [finalContent,setFinalContent] = useState("");

  // Session
  const [sessionId,setSessionId]       = useState(null);
  const [sessions,setSessions]         = useState(loadSessions);

  // Chat
  const [messages,setMessages]         = useState([]);
  const [userInput,setUserInput]       = useState("");
  const [loading,setLoading]           = useState(false);
  const [preparing,setPreparing]       = useState(false);
  const [prepareStatus,setPrepareStatus] = useState("");
  const [error,setError]               = useState("");

  // Progress
  const [bloomLevel,setBloomLevel]     = useState(1);
  const [bloomHistory,setBloomHistory] = useState([1]);
  const [newPhase,setNewPhase]         = useState("activate");
  const [deepenLevel,setDeepenLevel]   = useState(3);

  // File
  const [dragOver,setDragOver]         = useState(false);
  const [uploadedFile,setUploadedFile] = useState(null);

  const chatEndRef  = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(()=>{ chatEndRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const apiKey = config.keys?.[config.provider]||"";
  const provider = PROVIDERS[config.provider];

  // Auto-save session whenever messages change (and we're in learning phase)
  useEffect(()=>{
    if(phase==="learning" && sessionId && messages.length>0) {
      const session = {
        id:sessionId, subject, learningMode,
        content:finalContent, messages,
        newPhase, bloomLevel, bloomHistory, deepenLevel,
        provider:config.provider, model:config.model,
        createdAt: sessions.find(s=>s.id===sessionId)?.createdAt || Date.now(),
        updatedAt: Date.now(),
      };
      saveSession(session);
      setSessions(loadSessions());
    }
  }, [messages]);

  const transitions = { learningMode, newPhase, setNewPhase, setBloomLevel, setBloomHistory, setDeepenLevel };

  const getContent = async () => {
    if(inputTab==="text") return textContent;
    if(inputTab==="url"){
      setPrepareStatus("正在读取链接内容…");
      try {
        const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`);
        const d=await res.json();
        const tmp=document.createElement("div"); tmp.innerHTML=d.contents;
        ["script","style","nav","header","footer","aside"].forEach(tag=>tmp.querySelectorAll(tag).forEach(el=>el.remove()));
        return tmp.innerText.replace(/\n{3,}/g,"\n\n").trim();
      } catch { throw new Error("链接抓取失败，请复制内容后用文本粘贴模式"); }
    }
    if(inputTab==="file"){
      const ext=uploadedFile.name.split(".").pop().toLowerCase();
      setPrepareStatus(`解析 ${uploadedFile.name}…`);
      if(ext==="pdf") return parsePdf(uploadedFile);
      if(ext==="docx"||ext==="doc") return parseDocx(uploadedFile);
      if(ext==="txt"||ext==="md") return parseTxt(uploadedFile);
      throw new Error("不支持的文件格式");
    }
  };

  const startLearning = async () => {
    setError("");
    if(!apiKey){ setShowSettings(true); return; }
    setPreparing(true); setPrepareStatus("准备内容…");
    try {
      const content = await getContent();
      if(!content?.trim()) throw new Error("内容为空");
      setFinalContent(content);
      setPrepareStatus("启动对话…");
      const sysPrompt = learningMode==="new" ? NEW_PROMPT(content) : REVIEW_PROMPT(content);
      const reply = await callAI(config.provider, apiKey, config.model, sysPrompt, [{role:"user",content:"开始吧"}]);
      detectTransitions(reply, transitions);
      const newId = newSessionId();
      setSessionId(newId);
      const initMsgs = [{role:"assistant",content:reply}];
      setMessages(initMsgs);
      setBloomLevel(1); setBloomHistory([1]); setNewPhase("activate"); setDeepenLevel(3);
      // Save immediately
      const session = {id:newId,subject,learningMode,content,messages:initMsgs,newPhase:"activate",bloomLevel:1,bloomHistory:[1],deepenLevel:3,provider:config.provider,model:config.model,createdAt:Date.now(),updatedAt:Date.now()};
      saveSession(session); setSessions(loadSessions());
      setPhase("learning");
    } catch(e){ setError(e.message); }
    setPreparing(false); setPrepareStatus("");
  };

  const resumeSession = (session) => {
    setFinalContent(session.content);
    setSubject(session.subject||"");
    setLearningMode(session.learningMode);
    setMessages(session.messages||[]);
    setNewPhase(session.newPhase||"activate");
    setBloomLevel(session.bloomLevel||1);
    setBloomHistory(session.bloomHistory||[1]);
    setDeepenLevel(session.deepenLevel||3);
    setSessionId(session.id);
    setError("");
    setPhase("learning");
  };

  const sendMessage = async () => {
    if(!userInput.trim()||loading) return;
    const userMsg={role:"user",content:userInput};
    const next=[...messages,userMsg];
    setMessages(next); setUserInput(""); setLoading(true); setError("");
    const isResumed = messages.length > 0;
    const sysPrompt = learningMode==="new"
      ? (isResumed ? RESUME_NEW_PROMPT(finalContent) : NEW_PROMPT(finalContent))
      : (isResumed ? RESUME_REVIEW_PROMPT(finalContent) : REVIEW_PROMPT(finalContent));
    try {
      const reply = await callAI(config.provider, apiKey, config.model, sysPrompt, next);
      detectTransitions(reply, transitions);
      setMessages(p=>[...p,{role:"assistant",content:reply}]);
    } catch(e){
      setError(e.message);
      setMessages(p=>[...p,{role:"assistant",content:"⚠ "+e.message}]);
    }
    setLoading(false);
  };

  const resetAll = () => {
    setPhase("input"); setMessages([]); setBloomLevel(1); setBloomHistory([1]);
    setNewPhase("activate"); setDeepenLevel(3); setFinalContent("");
    setSessionId(null); setError(""); setTextContent(""); setUrlInput("");
    setUploadedFile(null); setSubject("");
  };

  const handleDeleteSession = (id) => {
    deleteSession(id);
    setSessions(loadSessions());
  };

  const canStart = (inputTab==="text"&&textContent.trim())||(inputTab==="url"&&urlInput.trim())||(inputTab==="file"&&uploadedFile);
  const isNew = learningMode==="new";
  const currentBloom = BLOOM[bloomLevel-1];
  const currentDeepen = BLOOM[deepenLevel-1]||BLOOM[2];

  // ── Settings overlay
  if(showSettings) return <SettingsPanel config={config} setConfig={setConfig} onClose={()=>setShowSettings(false)} />;

  // ── Learning page
  if(phase==="learning") return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"#13110e"}}>
      {/* Sidebar */}
      <div style={{width:220,background:"#0f0e0b",borderRight:"1px solid #2e2a22",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"14px",borderBottom:"1px solid #2e2a22",display:"flex",alignItems:"center",gap:7}}>
          <span style={{color:"#D4B86A",fontSize:14}}>✦</span>
          <span style={{fontSize:12,color:"#c8bfa8",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{subject||"学习会话"}</span>
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",color:provider.color,fontSize:13,cursor:"pointer",padding:2}} title="模型设置">{provider.icon}</button>
        </div>
        <div style={{padding:"10px 14px 0"}}>
          <div style={{fontSize:11,padding:"4px 10px",borderRadius:10,textAlign:"center",...(isNew?{background:"#9EBA8A18",color:"#9EBA8A",border:"1px solid #9EBA8A33"}:{background:"#D4B86A18",color:"#D4B86A",border:"1px solid #D4B86A33"})}}>
            {isNew?"◌ 新学模式":"◆ 复习模式"}
          </div>
        </div>
        <div style={{padding:"14px 0",flex:1}}>
          <div style={{fontSize:10,color:"#3a3428",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 14px 8px"}}>{isNew?"学习阶段进度":"Bloom 认知层次"}</div>
          {isNew ? (
            <>
              {NEW_PHASES.map((ph)=>{
                const myIdx=NEW_PHASES.findIndex(p=>p.id===ph.id);
                const curIdx=NEW_PHASES.findIndex(p=>p.id===newPhase);
                const active=ph.id===newPhase; const done=myIdx<curIdx;
                return (<div key={ph.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 14px",transition:"all 0.3s",background:active?ph.bg:"transparent",borderLeft:active?`3px solid ${ph.color}`:"3px solid transparent",opacity:done?0.4:active?1:0.22}}>
                  <span style={{color:ph.color,fontSize:15,width:18,textAlign:"center"}}>{ph.icon}</span>
                  <div><div style={{fontSize:12,color:active?ph.color:"#9a9585",fontWeight:500}}>{ph.name}{done?" ✓":""}</div><div style={{fontSize:10,color:"#4a4438"}}>{ph.desc}</div></div>
                </div>);
              })}
              {newPhase==="deepen"&&(
                <div style={{marginTop:8,paddingLeft:8,borderLeft:"1px solid #2e2a22",marginLeft:14}}>
                  <div style={{fontSize:9,color:"#3a3428",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 8px 6px"}}>Bloom 高阶层次</div>
                  {BLOOM.slice(2).map(l=>{const active=deepenLevel===l.id;const done=deepenLevel>l.id;return(
                    <div key={l.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",background:active?l.bg:"transparent",borderLeft:active?`2px solid ${l.color}`:"2px solid transparent",opacity:done?0.4:active?1:0.22}}>
                      <span style={{color:l.color,fontSize:12}}>{l.icon}</span>
                      <div style={{fontSize:11,color:active?l.color:"#7a7060"}}>{l.name}{done?" ✓":""}</div>
                    </div>
                  );})}
                </div>
              )}
            </>
          ) : BLOOM.map(l=>{const active=bloomLevel===l.id;const done=bloomHistory.includes(l.id)&&bloomLevel>l.id;return(
            <div key={l.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 14px",transition:"all 0.3s",background:active?l.bg:"transparent",borderLeft:active?`3px solid ${l.color}`:"3px solid transparent",opacity:done?0.4:active?1:0.22}}>
              <span style={{color:l.color,fontSize:14,width:18,textAlign:"center"}}>{l.icon}</span>
              <div><div style={{fontSize:12,color:active?l.color:"#9a9585",fontWeight:500}}>{l.name}{done?" ✓":""}</div><div style={{fontSize:10,color:"#4a4438"}}>{l.desc}</div></div>
            </div>
          );})}
        </div>
        <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
          <div style={{fontSize:10,color:"#3a3428",textAlign:"center"}}>{messages.length} 条消息 · 自动保存</div>
          <button onClick={resetAll} style={{padding:"7px 12px",background:"transparent",border:"1px solid #2e2a22",borderRadius:8,color:"#4a4438",fontSize:12,cursor:"pointer"}}>← 回到首页</button>
        </div>
      </div>

      {/* Chat */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"11px 20px",borderBottom:"1px solid #2e2a22",background:"#13110e"}}>
          {isNew?(()=>{
            const info={activate:{color:"#9EBA8A",text:"激活先验 — 连接你已有的认知",icon:"◌"},read:{color:"#8FA8C8",text:"分块阅读 — 逐段接触新知识",icon:"◎"},deepen:{color:"#D4B86A",text:`高阶深化 — ${currentDeepen.name}层`,icon:"✦"}};
            const pi=info[newPhase]||info.activate;
            return <div style={{fontSize:12,padding:"5px 14px",borderRadius:20,display:"inline-block",background:pi.color+"15",color:pi.color,border:`1px solid ${pi.color}33`}}>{pi.icon} {pi.text}</div>;
          })():(
            <div style={{fontSize:12,padding:"5px 14px",borderRadius:20,display:"inline-block",background:currentBloom.bg,color:currentBloom.color,border:`1px solid ${currentBloom.color}33`}}>{currentBloom.icon} 当前：{currentBloom.name}层 — {currentBloom.desc}</div>
          )}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px",display:"flex",flexDirection:"column",gap:14}}>
          {messages.map((m,i)=>(
            <div key={i} className="msg-enter" style={{display:"flex",alignItems:"flex-end",gap:9,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              {m.role==="assistant"&&<div style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,background:"#1c1a16",borderRadius:"50%",border:"1px solid #2e2a22",color:"#D4B86A"}}>✦</div>}
              <div style={{maxWidth:"76%",padding:"11px 15px",borderRadius:12,fontSize:14,lineHeight:1.75,...(m.role==="user"?{background:"#252018",border:"1px solid #3a3020",color:"#d4c9b0",borderBottomRightRadius:4,whiteSpace:"pre-wrap"}:{background:"#1c1a16",border:"1px solid #2e2a22",color:"#e8e0d0",borderBottomLeftRadius:4})}}>
                {m.role==="assistant"?React.createElement(FormattedMsg,{text:m.content}):m.content}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",alignItems:"flex-end",gap:9}}>
              <div style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,background:"#1c1a16",borderRadius:"50%",border:"1px solid #2e2a22",color:"#D4B86A"}}>✦</div>
              <div style={{background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:"12px 12px 12px 4px",padding:"14px 18px",display:"flex",gap:4}}>
                {[0,0.2,0.4].map((d,i)=><span key={i} style={{display:"inline-block",width:6,height:6,background:"#5a5248",borderRadius:"50%",animation:`pulse 1.4s ease-in-out ${d}s infinite`}}/>)}
              </div>
            </div>
          )}
          {error&&<div style={{padding:"10px 14px",background:"#2a1218",border:"1px solid #5a2a30",borderRadius:10,fontSize:12,color:"#c06070"}}>⚠ {error}</div>}
          <div ref={chatEndRef}/>
        </div>
        <div style={{padding:"12px 20px",borderTop:"1px solid #2e2a22",display:"flex",gap:9,alignItems:"flex-end",background:"#13110e"}}>
          <textarea style={{flex:1,background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:10,padding:"9px 13px",color:"#e8e0d0",fontSize:14,lineHeight:1.6,resize:"none",fontFamily:"'Noto Serif SC',serif"}}
            placeholder="输入你的回答… (Enter 发送，Shift+Enter 换行)"
            value={userInput} onChange={e=>setUserInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}} rows={2}/>
          <button style={{width:38,height:38,borderRadius:9,border:"none",background:"#D4B86A",color:"#13110e",fontSize:17,fontWeight:700,cursor:"pointer",transition:"all 0.2s",flexShrink:0,opacity:userInput.trim()&&!loading?1:0.3}}
            onClick={sendMessage} disabled={!userInput.trim()||loading}>↑</button>
        </div>
      </div>
    </div>
  );

  // ── Input page
  return (
    <div style={{minHeight:"100vh",background:"#13110e"}}>
      <div style={{maxWidth:700,margin:"0 auto",padding:"44px 24px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <span style={{display:"block",fontSize:24,color:"#D4B86A",marginBottom:12,textShadow:"0 0 20px #D4B86A55"}}>✦</span>
          <h1 style={{fontSize:30,fontWeight:700,color:"#f0e8d8",fontFamily:"'Crimson Pro',serif",letterSpacing:"0.04em",marginBottom:8}}>苏格拉底导师</h1>
          <p style={{fontSize:13,color:"#7a7060",lineHeight:1.8}}>通过对话引导你自己构建知识，而非被动接受灌输</p>
        </div>

        {/* Model button */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
          <button onClick={()=>setShowSettings(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px",background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:20,color:"#9a9080",fontSize:12,cursor:"pointer"}}>
            <span style={{color:provider.color}}>{provider.icon}</span>
            <span>{provider.name}</span>
            <span style={{color:"#5a5248"}}>·</span>
            <span>{PROVIDERS[config.provider].models.find(m=>m.id===config.model)?.label||config.model}</span>
            <span style={{color:"#4a4438",fontSize:10}}>⚙</span>
          </button>
        </div>

        {/* New session form */}
        <div style={{background:"#1c1a16",border:"1px solid #2e2a22",borderRadius:16,padding:28,marginBottom:28}}>
          {/* Learning mode */}
          <div style={{marginBottom:22}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>学习模式</div>
            <div style={{display:"flex",gap:10}}>
              {[{id:"new",icon:"◌",title:"新学模式",desc:"第一次接触这个内容",color:"#9EBA8A",flow:["激活先验知识","AI分块带你阅读","苏格拉底式消化","Bloom高阶深化"]},
                {id:"review",icon:"◆",title:"复习模式",desc:"已读过，想深化理解",color:"#D4B86A",flow:["记忆层提问","理解层追问","逐层递进至创造"]}].map(m=>(
                <div key={m.id} onClick={()=>setLearningMode(m.id)} style={{flex:1,padding:"14px 12px",borderRadius:12,cursor:"pointer",transition:"all 0.2s",border:`1.5px solid ${learningMode===m.id?m.color+"55":"#2e2a22"}`,background:learningMode===m.id?m.color+"0d":"#13110e"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <span style={{fontSize:14,color:learningMode===m.id?m.color:"#5a5248"}}>{m.icon}</span>
                    <span style={{fontSize:13,fontWeight:600,color:learningMode===m.id?m.color:"#7a7060"}}>{m.title}</span>
                    {learningMode===m.id&&<span style={{marginLeft:"auto",fontSize:10,color:m.color}}>● 已选</span>}
                  </div>
                  <p style={{fontSize:11,color:"#6a6050",marginBottom:7}}>{m.desc}</p>
                  {m.flow.map((s,i)=><div key={i} style={{display:"flex",gap:5,alignItems:"center"}}><span style={{fontSize:9,color:learningMode===m.id?m.color+"99":"#3a3428"}}>{i+1}.</span><span style={{fontSize:11,color:learningMode===m.id?"#b0a890":"#4a4438"}}>{s}</span></div>)}
                </div>
              ))}
            </div>
          </div>

          {/* Subject */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>学习主题（选填）</div>
            <input style={{width:"100%",background:"#13110e",border:"1px solid #2e2a22",borderRadius:8,padding:"10px 14px",color:"#e8e0d0",fontSize:13,fontFamily:"'Noto Serif SC',serif"}}
              placeholder="例如：牛顿第二定律、MCP协议…" value={subject} onChange={e=>setSubject(e.target.value)}/>
          </div>

          {/* Content source */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:"#6a6050",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>学习内容来源</div>
            <div style={{display:"flex",gap:2,background:"#13110e",borderRadius:"10px 10px 0 0",border:"1px solid #2e2a22",borderBottom:"none",padding:4}}>
              {[{id:"text",label:"文本粘贴",icon:"✎"},{id:"url",label:"链接",icon:"⊕"},{id:"file",label:"文件上传",icon:"⊞"}].map(t=>(
                <button key={t.id} onClick={()=>setInputTab(t.id)} style={{flex:1,padding:"7px 0",background:inputTab===t.id?"#2a2820":"transparent",border:"none",borderRadius:7,color:inputTab===t.id?"#c8b890":"#5a5248",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"all 0.2s"}}>
                  <span>{t.icon}</span>{t.label}
                </button>
              ))}
            </div>
            <div style={{background:"#13110e",border:"1px solid #2e2a22",borderRadius:"0 0 10px 10px",padding:14}}>
              {inputTab==="text"&&<><textarea style={{width:"100%",background:"transparent",border:"none",color:"#e8e0d0",fontSize:13,lineHeight:1.75,resize:"vertical",fontFamily:"'Noto Serif SC',serif"}}
                placeholder="将文章、教材、笔记粘贴到这里…" value={textContent} onChange={e=>setTextContent(e.target.value)} rows={8}/>
                <div style={{textAlign:"right",fontSize:10,color:"#3a3428",marginTop:6}}>{textContent.length} 字符</div></>}
              {inputTab==="url"&&<><p style={{fontSize:12,color:"#6a6050",marginBottom:8}}>支持网页链接，自动提取正文内容</p>
                <input style={{width:"100%",background:"#13110e",border:"1px solid #2e2a22",borderRadius:8,padding:"10px 14px",color:"#e8e0d0",fontSize:13,fontFamily:"'Noto Serif SC',serif"}}
                  placeholder="https://…" value={urlInput} onChange={e=>setUrlInput(e.target.value)}/>
                <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  {["博客文章","维基百科","课程页面","新闻报道"].map(t=><span key={t} style={{fontSize:11,color:"#5a7050",background:"#1a2218",padding:"2px 8px",borderRadius:10,border:"1px solid #2a3a28"}}>✓ {t}</span>)}
                </div></>}
              {inputTab==="file"&&<><div style={{border:`1.5px dashed ${dragOver?"#D4B86A":"#2e2a22"}`,background:dragOver?"#D4B86A08":"transparent",borderRadius:10,padding:28,textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);setUploadedFile(e.dataTransfer.files[0]);}}
                onClick={()=>fileInputRef.current?.click()}>
                {uploadedFile?(<div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center"}}>
                  <span style={{fontSize:26}}>{fileIcon(uploadedFile.name)}</span>
                  <div style={{textAlign:"left"}}><div style={{fontSize:13,color:"#c8b890",fontWeight:500}}>{uploadedFile.name}</div><div style={{fontSize:11,color:"#5a5248"}}>{(uploadedFile.size/1024).toFixed(1)} KB</div></div>
                  <button style={{background:"none",border:"1px solid #3a3428",borderRadius:"50%",color:"#5a5248",width:22,height:22,cursor:"pointer",fontSize:14}} onClick={e=>{e.stopPropagation();setUploadedFile(null);}}>×</button>
                </div>):(<><div style={{fontSize:28,color:"#4a4438",marginBottom:8}}>⊞</div><div style={{fontSize:13,color:"#9a9585",marginBottom:4}}>拖拽文件到这里，或点击选择</div><div style={{fontSize:11,color:"#4a4438"}}>支持 PDF · DOCX · TXT · Markdown</div></>)}
              </div>
              <input ref={fileInputRef} type="file" accept=".txt,.pdf,.docx,.doc,.md" style={{display:"none"}} onChange={e=>setUploadedFile(e.target.files[0])}/></>}
            </div>
          </div>

          {!apiKey&&<div style={{marginBottom:16,padding:"10px 14px",background:"#2a1a12",border:"1px solid #5a3a2a",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#c08060"}}>⚠ 需要先配置 API Key 才能开始</span>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"1px solid #5a3a2a",borderRadius:8,color:"#c08060",fontSize:12,padding:"4px 10px",cursor:"pointer"}}>配置 →</button>
          </div>}
          {(prepareStatus||error)&&<div style={{marginBottom:14,padding:"8px 14px",background:error?"#2a1218":"#D4B86A0a",border:`1px solid ${error?"#5a2a30":"#D4B86A22"}`,borderRadius:8,fontSize:12,color:error?"#c06070":"#D4B86A",textAlign:"center"}}>{error||prepareStatus}</div>}
          <button style={{width:"100%",padding:14,background:"#D4B86A",color:"#13110e",border:"none",borderRadius:10,fontSize:15,fontWeight:700,letterSpacing:"0.05em",transition:"all 0.2s",opacity:canStart&&!preparing?1:0.35,cursor:canStart&&!preparing?"pointer":"not-allowed"}}
            onClick={startLearning} disabled={!canStart||preparing}>
            {preparing?"处理中…":`开始${learningMode==="new"?"新学":"复习"}对话 →`}
          </button>
        </div>

        {/* History section */}
        {sessions.length > 0 && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,color:"#7a7060",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16,color:"#4a4438"}}>◫</span>
                学习历史记录
                <span style={{fontSize:11,color:"#3a3428",background:"#1c1a16",padding:"2px 8px",borderRadius:10,border:"1px solid #2e2a22"}}>{sessions.length} 个会话</span>
              </div>
              <button onClick={()=>{if(confirm("确认清空所有历史记录？此操作不可撤销。")){persistSessions([]);setSessions([]);}}}
                style={{background:"none",border:"none",color:"#3a3028",cursor:"pointer",fontSize:12}}>清空全部</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {sessions.map(s=><SessionCard key={s.id} session={s} onResume={resumeSession} onDelete={handleDeleteSession}/>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
